codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "60...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%
        # Report patch coverage but do not fail the PR check on it. Much of
        # this codebase is interactive CLI, live network protocol flows, and
        # deploy plumbing that is exercised by integration/e2e rather than
        # unit tests, so a low patch number on such changes should not block
        # merges. The project status (above) still gates overall coverage.
        informational: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: no
