# NHP-Server base config
# field with (-) does not support dynamic update

# PrivateKeyBase64 (-): server private key in base64 format.
# DefaultCipherScheme: 0: curve25519, 1: gmsm.
# MIGRATION: Values changed in v2.x. If upgrading: old 0(gmsm)->new 1, old 1(curve)->new 0.
# ListenIp (-): udp listening address.
# ListenPort (-): udp listening port.
# Hostname (-): server domain name.
# LogLevel: 0: silent, 1: error, 2: info, 3: audit, 4: debug, 5: trace.
# DisableAgentValidation: whether for the server to skip the agent's public key validation.
# AllowPrivateRelaySource: accept private (RFC1918 / loopback / CGNAT)
#   addresses in RelayForwardMsg.SourceAddr. Keep false in production:
#   a public-facing relay should only ever forward public clients, so
#   a private SourceAddr there is a sign of a compromised relay
#   injecting fabricated entries. Set true only in trusted local
#   demos where the relay legitimately sees private addresses
#   (e.g. Docker Desktop's vpnkit gateway).
# ForceOverload: pin the device's Overload flag ON at startup so every
#   agent goes through the cookie-stamped KNK → COK → RKN handshake.
#   Debug/test only — production must rely on the natural connection-
#   count trigger. Leave false except when reproducing or testing
#   cookie-path behavior on a quiet local stack.
PrivateKeyBase64 = "eHdyRHKJy/YZJsResCt5XTAZgtcwvLpSXAiZ8DBc0V4="
DefaultCipherScheme = 0
ListenIp = ""    # empty for ipv4 + ipv6, "0.0.0.0" for ipv4 only
ListenPort = 62206
Hostname = "localhost" # the hostname of NHP-Server
LogLevel = 4
DisableAgentValidation = false
AllowPrivateRelaySource = false
ForceOverload = false

# Tamper-evident security audit ledger (optional, disabled by default).
# When Enabled, security decisions (knock granted/denied, OTP issued/failed,
# agent registered) are appended as hash-chained JSON lines so any later
# edit, deletion or reordering is detectable. Verify a ledger with:
#   nhp-serverd audit verify <FilePath> [--key <SigningKey>]
# FilePath: ledger path; relative paths resolve against the exe dir.
#   Defaults to logs/audit-ledger.jsonl.
# Fsync: flush each entry to disk (safer, negligible cost at audit volume).
# SigningKeyBase64: optional base64 HMAC key binding the chain to a secret
#   the log file does not contain. Generate one with:
#   head -c 32 /dev/urandom | base64
[Audit]
Enabled = false
FilePath = ""
Fsync = true
SigningKeyBase64 = ""
